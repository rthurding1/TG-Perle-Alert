services:
  - type: worker
    name: tg-perle-alert
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: POLL_INTERVAL_SECONDS
        value: "60"
      - key: COOLDOWN_HOURS
        value: "4"
      - key: THRESHOLD_STEP_M
        value: "25"
